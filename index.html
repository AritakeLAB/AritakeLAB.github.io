<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Page</title>
    <style>
        html, body {
            height: 100%; /* ページの高さ全体を使う */
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        body {
            display: flex; /* Flexboxを使って中央揃え */
            justify-content: center; /* 水平方向の中央揃え */
            align-items: center; /* 垂直方向の中央揃え */
            text-align: center;
        }
        a {
            font-size: 1.5em; /* 文字を少し大きくする */
            color: #0077cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline; /* マウスを乗せたら下線を引く */
        }
    </style>
</head>
<body>

    <a href="https://sites.google.com/view/yuki-aritake/home">サイトへ移動する</a>

</body>
</html>
